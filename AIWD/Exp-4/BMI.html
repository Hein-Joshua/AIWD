<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS BMI Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px #eee; }
        input { margin: 10px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>BMI Calculator</h2>
    <label>Weight (kg):</label>
    <input type="number" id="weight" placeholder="e.g. 70">
    
    <label>Height (cm):</label>
    <input type="number" id="height" placeholder="e.g. 175">
    
    <button onclick="calculate()">Calculate BMI</button>
    
    <div id="result"></div>
</div>

<script>
function calculate() {
    
    const weight = parseFloat(document.getElementById('weight').value);
    const heightCm = parseFloat(document.getElementById('height').value);
    const resultDiv = document.getElementById('result');
    
    if (!weight || !heightCm) {
        resultDiv.innerHTML = "Please enter valid numbers!";
        return;
    }

    const heightM = heightCm / 100;
    const bmi = (weight / (heightM * heightM)).toFixed(1);

    let category = "";
    if (bmi < 18.5) category = "Underweight";
    else if (bmi < 25) category = "Normal weight";
    else if (bmi < 30) category = "Overweight";
    else category = "Obese";

    resultDiv.innerHTML = `Your BMI is ${bmi} <br> (${category})`;
}
</script>

</body>
</html>
