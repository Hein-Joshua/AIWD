<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Countdown Timer</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
    .container { max-width: 650px; margin: 30px auto; background: white; border-radius: 10px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #2c3e50; }
    p.subtitle { text-align: center; color: #777; margin-bottom: 25px; }

    #countdown-box { background: #2c3e50; color: white; border-radius: 10px; padding: 20px; text-align: center; margin-bottom: 30px; }
    #countdown-box h2 { margin: 0 0 15px; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }
    .timer-grid { display: flex; justify-content: center; gap: 15px; }
    .time-unit { background: #3d5166; border-radius: 8px; padding: 12px 18px; min-width: 70px; }
    .time-unit span.number { display: block; font-size: 2rem; font-weight: bold; color: #3498db; }
    .time-unit span.label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-top: 4px; }
    #closed-msg { display: none; color: #e74c3c; font-size: 1.3rem; font-weight: bold; padding: 10px 0; }

    h2.form-title { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #444; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; box-sizing: border-box; }
    input:focus, select:focus { border-color: #3498db; outline: none; }
    button[type="submit"] { width: 100%; padding: 12px; background: #2980b9; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; margin-top: 5px; }
    button[type="submit"]:hover { background: #2471a3; }
  </style>
</head>
<body>

<div class="container">
  <h1>TechNexus 2026</h1>
  <p class="subtitle">Register before time runs out!</p>

  <div id="countdown-box">
    <h2>Registration Closes In</h2>
    <div class="timer-grid">
      <div class="time-unit">
        <span class="number" id="days">00</span>
        <span class="label">Days</span>
      </div>
      <div class="time-unit">
        <span class="number" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="time-unit">
        <span class="number" id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="time-unit">
        <span class="number" id="seconds">00</span>
        <span class="label">Seconds</span>
      </div>
    </div>
    <div id="closed-msg">Registration Closed</div>
  </div>

  <h2 class="form-title">Registration Form</h2>
  <form action="#" method="post">

    <div class="form-group">
      <label for="fname">Full Name</label>
      <input type="text" id="fname" name="fname" placeholder="Enter your name" required />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="example@mail.com" required />
    </div>

    <div class="form-group">
      <label for="track">Select Track</label>
      <select id="track" name="track">
        <option value="">-- Choose a Track --</option>
        <option value="ai">Artificial Intelligence</option>
        <option value="web">Web Development</option>
        <option value="cyber">Cybersecurity</option>
      </select>
    </div>

    <button type="submit">Register Now</button>
  </form>
</div>

<script>
  // Set your future event date here (YYYY, MM-1, DD, HH, MM, SS)
  // Month is 0-indexed: 0=Jan, 1=Feb ... 11=Dec
  const eventDate = new Date(2026, 5, 8, 23, 59, 59); 

  const timer = setInterval(function () {
    const now = new Date();
    const diff = eventDate - now; // difference in milliseconds

    if (diff <= 0) {
      clearInterval(timer);
      document.getElementById("days").textContent    = "00";
      document.getElementById("hours").textContent   = "00";
      document.getElementById("minutes").textContent = "00";
      document.getElementById("seconds").textContent = "00";
      document.getElementById("closed-msg").style.display = "block";
      return;
    }

    const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("days").textContent    = String(days).padStart(2, "0");
    document.getElementById("hours").textContent   = String(hours).padStart(2, "0");
    document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
    document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");

  }, 1000);
</script>

</body>
</html>
