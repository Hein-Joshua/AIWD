<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNexus 2026 | Event Registration</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>TechNexus 2026</h1>
        <p>The Ultimate Web Technology Symposium</p>
    </header>

    <div class="container my-4 bg-white rounded shadow p-4">

        <!-- MEDIA SECTION -->
        <section class="promo-section text-center mb-5">
            <h2>Event Teaser</h2>
            <p class="text-muted">Watch our promotional video to see what's in store!</p>

            <div class="ratio ratio-16x9 mb-3">
                <video controls poster="https://via.placeholder.com/700x400?text=TechNexus+2026+Teaser">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <audio controls class="w-100">
                <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>

        <!-- REGISTRATION FORM -->
        <section>
            <h2>Registration Form</h2>

            <!-- action points to Node.js route /register -->
            <form action="/register" method="post" class="mt-3">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label for="fname" class="form-label fw-bold">Full Name</label>
                        <input type="text" id="fname" name="fname" class="form-control" placeholder="Enter your name"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="example@mail.com"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label for="event-date" class="form-label fw-bold">Preferred Session Date</label>
                        <input type="date" id="event-date" name="event-date" class="form-control" min="2026-01-01">
                    </div>

                    <div class="col-md-6">
                        <label for="tickets" class="form-label fw-bold">Number of Tickets (1-5)</label>
                        <input type="number" id="tickets" name="tickets" class="form-control" min="1" max="5" value="1">
                    </div>

                    <div class="col-md-6">
                        <label for="tshirt" class="form-label fw-bold">T-Shirt Size</label>
                        <select id="tshirt" name="tshirt" class="form-select">
                            <option value="s">Small</option>
                            <option value="m">Medium</option>
                            <option value="l">Large</option>
                            <option value="xl">Extra Large</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="experience" class="form-label fw-bold">
                            Skill Level: <span id="rangeVal">5</span>/10
                        </label>
                        <input type="range" id="experience" name="experience" class="form-range" min="1" max="10"
                            value="5" oninput="document.getElementById('rangeVal').textContent = this.value">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Participation Mode</label>
                        <div class="d-flex gap-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="mode" id="online" value="online"
                                    checked>
                                <label class="form-check-label" for="online">Online</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="mode" id="offline" value="offline">
                                <label class="form-check-label" for="offline">Offline</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="mode" id="hybrid" value="hybrid">
                                <label class="form-check-label" for="hybrid">Hybrid</label>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="comments" class="form-label fw-bold">Any Special Requirements?</label>
                        <textarea id="comments" name="comments" class="form-control" rows="4"></textarea>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-primary w-100 py-3 fs-5">
                            Register Now
                        </button>
                    </div>

                </div>
            </form>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
